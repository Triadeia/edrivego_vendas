  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const curtainStartedAt = performance.now();
  const curtainMinimumMs = 0;
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Preparando ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    const elapsed = performance.now() - curtainStartedAt;
    if (elapsed < curtainMinimumMs) {
      setStatus('Abrindo o aluguel...');
      await new Promise((resolve) => window.setTimeout(resolve, curtainMinimumMs - elapsed));
    }
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

o gera avaliação. Não aumenta seu score. Mas leva R$800, R$1.000 ou mais do seu mês antes de virar lucro. É a corrida que você faz para pagar a gasolina.<\/p>\n    <\/div>\n    <div style=\"border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; background: rgba(10,8,18,0.7); padding: 30px\">\n      <p style=\"margin: 0; color: #2ee6a8; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em\">Corrida Negativa<\/p>\n      <p style=\"font-size: 22px; font-weight: 700; line-height: 1.35; margin: 12px 0 0\">É quando você trabalha, mas parte do dinheiro já tem destino certo: <span style=\"color: #c9a8f0\">o posto.<\/span><\/p>\n      <a href=\"#virada\" style=\"display: inline-flex; align-items: center; gap: 8px; margin-top: 20px; color: #2ee6a8; font-size: 14px; font-weight: 800\" style-hover=\"color: #7ff0c8\">\n        Ver como funciona a Virada Elétrica\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14\"><\/path><path d=\"m19 12-7 7-7-7\"><\/path><\/svg>\n      <\/a>\n    <\/div>\n  <\/section>\n\n  <!-- VIRADA ELETRICA -->\n  <section id=\"virada\" data-screen-label=\"Virada Eletrica\" style=\"width: min(1160px, calc(100% - 40px)); margin: 24px auto 0; padding: 48px 0 8px\">\n    <div style=\"max-width: 640px\">\n      <p style=\"margin: 0; color: #2ee6a8; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em\">A oportunidade<\/p>\n      <h2 style=\"font-family: 'Archivo Black', 'Archivo', sans-serif; font-size: clamp(30px, 3.6vw, 46px); line-height: 1.02; margin: 12px 0 14px\">A Virada Elétrica é a mudança de lógica.<\/h2>\n      <p style=\"color: #b9b3c9; font-size: 17px; line-height: 1.6; margin: 0\">Em vez de comprar, financiar por anos ou continuar preso ao combustível, você entra em um modelo de locação pensado para motorista de app: atendimento no grupo, análise da documentação e, aprovado, contrato de locação — e o carro é seu para rodar.<\/p>\n    <\/div>\n    <div class=\"m1\" style=\"display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; margin-top: 30px\">\n      <sc-for list=\"{{ benefits }}\" as=\"b\" hint-placeholder-count=\"6\">\n        <div style=\"display: flex; gap: 12px; align-items: flex-start; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(255,255,255,0.04); padding: 18px\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2ee6a8\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex: 0 0 auto; margin-top: 1px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\/circle><path d=\"m9 12 2 2 4-4\"><\/path><\/svg>\n          <div>\n            <strong style=\"display: block; font-size: 15px\">{{ b.title }}<\/strong>\n            <span style=\"color: #8f88a3; font-size: 13px; line-height: 1.45\">{{ b.text }}<\/span>\n          <\/div>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n    <p style=\"margin: 14px 0 0; color: #8f88a3; font-size: 12.5px\">Condições confirmadas no atendimento e no contrato. Benefícios sujeitos às regras vigentes da operação.<\/p>\n  <\/section>\n\n  <!-- BYD SHOWCASE -->\n  <section data-screen-label=\"BYD Dolphin\" style=\"width: min(1160px, calc(100% - 40px)); margin: 52px auto 0\">\n    <div style=\"max-width: 640px\">\n      <p style=\"margin: 0; color: #2ee6a8; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em\">O carro<\/p>\n      <h2 style=\"font-family: 'Archivo Black', 'Archivo', sans-serif; font-size: clamp(28px, 3.6vw, 46px); line-height: 1.02; margin: 12px 0 0\">O elétrico que muda a conta do motorista.<\/h2>\n    <\/div>\n    <div class=\"m1\" style=\"display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px; margin-top: 24px\">\n      <figure style=\"margin: 0; position: relative; border: 1px solid rgba(255,255,255,  rodar com uma frota limitada com atendimento próximo, análise séria e contrato transparente.<\/p>\n      <div style=\"display: grid; gap: 12px; margin-top: 22px\">\n        <div style=\"border: 1px solid rgba(46,230,168,0.3); border-radius: 14px; background: rgba(46,230,168,0.07); padding: 18px 20px\">\n          <strong style=\"display: block; font-size: 15px; color: #2ee6a8\">Fale com a equipe no grupo.<\/strong>\n          <span style=\"color: #b9b3c9; font-size: 14px; line-height: 1.5\">Entre no grupo no WhatsApp: a equipe tira suas dúvidas e conduz documentação, análise e contrato com você.<\/span>\n        <\/div>\n        <div style=\"border: 1px solid rgba(201,168,240,0.35); border-radius: 14px; background: rgba(75,0,129,0.18); padding: 18px 20px\">\n          <strong style=\"display: block; font-size: 15px; color: #c9a8f0\">Aprovado? Pague a semana e saia com seu carro 0km.<\/strong>\n          <span style=\"color: #b9b3c9; font-size: 14px; line-height: 1.5\">Aluguel semanal de R$1.799 com revisões, seguro e recargas no ecossistema eDrive. Contrato assinado, você já sai com o veículo, conforme disponibilidade.<\/span>\n        <\/div>\n        <div style=\"border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(255,255,255,0.04); padding: 18px 20px\">\n          <strong style=\"display: block; font-size: 15px\">O BYD 0km na sua garagem<\/strong>\n          <span style=\"color: #b9b3c9; font-size: 14px; line-height: 1.5\">Não é um carro velho que quebra na hora errada. É um 0km com autonomia para rodar o dia inteiro — você acorda com o carro carregado, sem passar em posto nenhum.<\/span>\n        <\/div>\n        <div style=\"border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(255,255,255,0.04); padding: 18px 20px\">\n          <strong style=\"display: block; font-size: 15px\">Comunidade de motoristas<\/strong>\n          <span style=\"color: #b9b3c9; font-size: 14px; line-height: 1.5\">Você entra num grupo de quem já fez a virada: rotas, dúvidas respondidas e economia real compartilhada. Comunidade não é bônus — é parte do resultado.<\/span>\n        <\/div>\n        <div style=\"border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(255,255,255,0.04); padding: 18px 20px\">\n          <strong style=\"display: block; font-size: 15px\">Sem caução e sem entrada<\/strong>\n          <span style=\"color: #b9b3c9; font-size: 14px; line-height: 1.5\">Você não imobiliza dinheiro para começar a trabalhar. O compromisso é o aluguel semanal — simples assim.<\/span>\n        <\/div>\n      <\/div>\n    <\/div>\n\n    <div class=\"offerCard\" style=\"position: sticky; top: 92px; border: 1px solid rgba(46,230,168,0.35); border-radius: 20px; background: linear-gradient(180deg, rgba(46,230,168,0.1), rgba(20,16,31,0.95) 42%); box-shadow: 0 30px 70px rgba(0,0,0,0.45); padding: 30px\">\n      <p style=\"margin: 0; color: #2ee6a8; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em\">Aluguel eDrive Go<\/p>\n      <div style=\"display: flex; align-items: baseline; gap: 8px; margin: 12px 0 4px\">\n        <span style=\"font-family: 'Archivo Black', 'Archivo', sans-serif; font-size: 52px; line-height: 1\">R$1.799<\/span>\n        <span style=\"color: #8f88a3; font-size: 14px\">/semana<\/span>\n      <\/div>\n      <p style=\"margin: 0 0 12px; color: #b9b3c9; font-size: 14px\">BYD Dolphin 0km com tudo incluso para rodar de app.<\/p>\n      <div style=\"border: 1px solid rgba(46,230,168,0.3); border-radius: 10px; background: rgba(46,230,168,0.08); padding: 12px 14px; margin-bottom: 16px\">\n        <span style=\"color: #ded8ea; font-size: 13px; line-height: 1.5\"><strong style=\"color: #2ee6a8\">Tudo incluso:<\/strong> revisões, seguro e 2 recargas por semana no ecossistema eDrive — <strong>sem caução e sem entrada<\/strong>.<\/span>\n      <\/div>\n      <div style=\"display: grid; gap: 9px\">\n        <sc-for list=\"{{ offerIncludes }} so grupo no WhatsApp.<\/p>\n    <\/div>\n  <\/section>\n\n  <!-- COMO FUNCIONA -->\n  <section data-screen-label=\"Como funciona\" style=\"width: min(1160px, calc(100% - 40px)); margin: 56px auto 0; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; background: rgba(255,255,255,0.03); padding: 44px\">\n    <p style=\"margin: 0; color: #2ee6a8; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em\">Como funciona<\/p>\n    <h2 style=\"font-family: 'Archivo Black', 'Archivo', sans-serif; font-size: clamp(28px, 3.2vw, 42px); line-height: 1.02; margin: 12px 0 0\">Do clique ao carro, em 5 passos.<\/h2>\n    <div class=\"m1\" style=\"display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; margin-top: 28px\">\n      <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"5\">\n        <div style=\"border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(10,8,18,0.6); padding: 18px\">\n          <span style=\"display: inline-grid; place-items: center; width: 34px; height: 34px; border-radius: 10px; background: rgba(75,0,129,0.5); border: 1px solid rgba(201,168,240,0.35); color: #c9a8f0; font-size: 14px; font-weight: 900\">{{ step.n }}<\/span>\n          <strong style=\"display: block; margin: 14px 0 6px; font-size: 15px; line-height: 1.25\">{{ step.title }}<\/strong>\n          <span style=\"color: #8f88a3; font-size: 13px; line-height: 1.45\">{{ step.text }}<\/span>\n        <\/div>\n      <\/sc-for>\n    <\/div>\n    <p style=\"margin: 18px 0 0; color: #8f88a3; font-size: 12.5px\">O contato pelo grupo não garante aprovação, contratação, veículo específico ou prazo de entrega.<\/p>\n  <\/section>\n\n  <!-- CALCULADORA -->\n  <section id=\"calculadora\" data-screen-label=\"Calculadora\" style=\"width: min(1160px, calc(100% - 40px)); margin: 56px auto 0\">\n    <div style=\"max-width: 660px\">\n      <p style=\"margin: 0; color: #2ee6a8; font-size: 13px; font-weight: 800; text-transf lStep: \"form\",\n    lead: { nome: \"\", whatsapp: \"\", anos: \"\", pagaAgora: null },\n    formError: \"\",\n    checks: [false, false, false, false, false, false, false],\n    webhookSent: false,\n    showTermDoc: false,\n    calc: { kmDay: 180, daysWeek: 6, gasPrice: 6.2, kmL: 10, kwhPrice: 1.1, evKwh100: 13, manutMes: 300 },\n    chargerCount: 0,\n    calcProfile: \"normal\",\n    calcPeriod: \"mes\",\n    cityIndex: 0,\n    heroBarOn: false,\n    offerSeconds: 1200,\n    notifOn: false,\n    notifIndex: 0,\n    reservedCount: 0\n  };\n\n  // Cronograma do lançamento simulado (segundos desde o início da sessão)\n  SIM_SCHEDULE = [10, 15, 40, 120, 160, 210];\n\n  NOTIFS = [\n    { n: \"Pedro\", c: \"Camaçari\" },\n    { n: \"João Paulo\", c: \"Salvador\" },\n    { n: \"Marcos\", c: \"Lauro de Freitas\" },\n    { n: \"Ana Paula\", c: \"Simões Filho\" },\n    { n: \"Rafael\", c: \"Arembepe\" },\n    { n: \"Carlos\", c: \"Dias d'Ávila\" },\n    { n: \"Luciana\", c: \"Mata de São João\" },\n    { n: \"Thiago\", c: \"Ilha de Itaparica\" }\n  ];\n\n  startLaunchSim() {\n    let simStart = 0;\n    try { simStart = parseInt(localStorage.getItem(\"edrive_sim_start\") || \"0\", 10); } catch (e) { /* noop */ }\n    if (!simStart) {\n      simStart = Date.now();\n      try { localStorage.setItem(\"edrive_sim_start\", String(simStart)); } catch (e) { /* noop */ }\n    }\n    const elapsed = (Date.now() - simStart) / 1000;\n    const done = this.SIM_SCHEDULE.filter((t) => t <= elapsed).length;\n    this.setState({ reservedCount: done, notifIndex: Math.max(0, done - 1) });\n    this.SIM_SCHEDULE.forEach((t, i) => {\n      if (t > elapsed) {\n        window.setTimeout(() => {\n          this.setState({ reservedCount: i + 1, notifIndex: i, notifOn: true });\n          window.setTimeout(() => this.setState({ notifOn: false }), 6500);\n        }, (t - elapsed) * 1000);\n      }\n    });\n  }\n\n  CITIES = [\"Salvador\", \"Lauro de Freitas\", \"Abrantes\", \"Arembepe\", \"Simões F lStep === \"terms\",\n      modalStepDone: modalStep === \"done\",\n      leadNome: lead.nome,\n      leadWhatsapp: lead.whatsapp,\n      leadAnos: lead.anos,\n      onNomeChange: (e) => this.setState({ lead: { ...lead, nome: e.target.value } }),\n      onWhatsappChange: (e) => this.setState({ lead: { ...lead, whatsapp: e.target.value } }),\n      onAnosChange: (e) => this.setState({ lead: { ...lead, anos: e.target.value } }),\n      setPagaSim: () => this.setState({ lead: { ...lead, pagaAgora: \"sim\" } }),\n      setPagaNao: () => this.setState({ lead: { ...lead, pagaAgora: \"nao\" } }),\n      simBorder: paySim ? \"#2ee6a8\" : \"rgba(255,255,255,0.16)\",\n      simBg: paySim ? \"rgba(46,230,168,0.15)\" : \"rgba(255,255,255,0.05)\",\n      simColor: paySim ? \"#2ee6a8\" : \"#ded8ea\",\n      naoBorder: payNao ? \"#c9a8f0\" : \"rgba(255,255,255,0.16)\",\n      naoBg: payNao ? \"rgba(75,0,129,0.3)\" : \"rgba(255,255,255,0.05)\",\n      naoColor: payNao ? \"#c9a8f0\" : \"#ded8ea\",\n      formError,\n      goToTerms: () => {\n        const digits = lead.whatsapp.replace(/\\D/g, \"\");\n        if (!lead.nome.trim()) return this.setState({ formError: \"Informe seu nome para continuar.\" });\n        if (digits.length < 10) return this.setState({ formError: \"Informe um WhatsApp válido com DDD.\" });\n        if (!lead.anos) return this.setState({ formError: \"Informe há quantos anos você roda de app.\" });\n        if (!lead.pagaAgora) return this.setState({ formError: \"Confirme sua resposta.\" });\n        this.setState({ formError: \"\", modalStep: \"terms\" });\n      },\n      termItems: this.termsTexts().map((text, i) => ({\n        text,\n        checked: checks[i],\n        toggle: () => {\n          const next = [...this.state.checks];\n          next[i] = !next[i];\n          this.setState({ checks: next });\n        }\n      })),\n      acceptDisabled: !allChecked,\n      acceptBg: allChecked ? \"#2ee6a8\" : \"rgba(255,255,255,0.08)\",\n      acceptColor: a
